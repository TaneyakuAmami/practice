<!doctype html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <title>login</title>
        {% load static %}
        <link rel="stylesheet" href="{% static 'csspractice/css/login.css' %}">
    </head>
    <!-- 参考：https://web-camp.io/magazine/archives/82498/ -->
    <body>
        <form name="login_form">
            <div class="login_form_top">
                <h1>LOGIN</h1>
                <p>UserID Passwordをご入力の上、「LOGIN」ボタンをクリックしてください。</p>
            </div>
            <div class="login_form_btn">
                <input type="id" name="user_id" placeholder="UserID">
                <input type="password" name="password" placeholder="Password">
                <input type="submit" name="botton" value="LOGIN">
            </div>
        </form>
    </body>
</html>
